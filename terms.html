<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terms &amp; Policies — LingroLearning</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .terms-card {
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        padding: 48px 56px;
        max-width: 600px;
        width: 100%;
        margin: 40px auto;
      }

      .terms-card h1 {
        font-size: 1.6rem;
        font-weight: 700;
        color: #0f75b8;
        margin-bottom: 8px;
      }

      .terms-card .subtitle {
        font-size: 0.95rem;
        color: #777;
        margin-bottom: 36px;
      }

      .terms-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .terms-list li a {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 18px 20px;
        border: 1.5px solid #e5e7eb;
        border-radius: 10px;
        text-decoration: none;
        color: #1a1a2e;
        font-weight: 600;
        font-size: 0.95rem;
        transition: border-color 0.15s, background-color 0.15s;
      }

      .terms-list li a:hover {
        border-color: #0f75b8;
        background-color: #f0f8ff;
      }

      .terms-list li a .icon {
        flex-shrink: 0;
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background-color: #e8f4fc;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
      }

      .terms-list li a .arrow {
        margin-left: auto;
        color: #aaa;
        font-size: 1rem;
      }

      .terms-list li a:hover .arrow {
        color: #0f75b8;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="terms-card">
        <h1>Terms &amp; Policies</h1>
        <p class="subtitle">Please review the following agreements before using LingroLearning.</p>

        <ul class="terms-list">
          <li>
            <a href="https://lingrolearning.com/terms/" target="_blank" rel="noopener noreferrer">
              <span class="icon">📄</span>
              LingroLearning Terms of Use
              <span class="arrow">↗</span>
            </a>
          </li>
          <li>
            <a href="https://lingrolearning.com/privacy-policy/" target="_blank" rel="noopener noreferrer">
              <span class="icon">🔒</span>
              LingroLearning Privacy Policy
              <span class="arrow">↗</span>
            </a>
          </li>
          <li>
            <a href="ai-terms.html">
              <span class="icon">🤖</span>
              AI Chatbot Terms of Use
              <span class="arrow">→</span>
            </a>
          </li>
        </ul>
      </div>
    </div>
  </body>
</html>
